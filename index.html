<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Text Paste Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Quick Text Paste Web</h1>
    <p>Search, click, copy, then paste into ServiceNow, Notepad, Teams, Outlook, or Citrix.</p>
  </header>

  <main>
    <section class="toolbar">
      <input id="searchBox" type="search" placeholder="Search responses..." autofocus />
      <button id="clearBtn" type="button">Clear</button>
    </section>

    <section class="help">
      <strong>Shortcuts:</strong>
      <span><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>F</kbd> search</span>
      <span><kbd>Ctrl</kbd> + <kbd>1-9</kbd> copy visible item</span>
    </section>

    <section id="status" aria-live="polite"></section>
    <section id="responseList" class="response-list"></section>
  </main>

  <footer>
    Edit canned responses in <code>responses.js</code>. Change shortcuts in <code>app.js</code>.
  </footer>

  <script src="responses.js"></script>
  <script src="app.js"></script>
</body>
</html>
