<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quick Text</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="launcher" aria-label="Quick Text snippet picker">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">QT</span>
          <div class="brand-copy">
            <h1>Quick Text</h1>
            <p id="resultCount">Loading snippets</p>
          </div>
        </div>
        <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>
      </header>

      <div class="search-wrap">
        <label class="sr-only" for="searchInput">Search snippets</label>
        <input
          class="search-input"
          id="searchInput"
          type="search"
          placeholder="Search snippets"
          autocomplete="off"
          spellcheck="false"
          aria-controls="snippetList"
          aria-autocomplete="list"
        >
      </div>

      <section class="results-wrap" aria-label="Snippet results">
        <ul class="snippet-list" id="snippetList" role="listbox"></ul>
        <div class="empty-state" id="emptyState" hidden>No snippets match</div>
      </section>
    </main>

    <script src="responses.js"></script>
    <script src="app.js"></script>
  </body>
</html>
