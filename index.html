<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Frandy Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Frandy Assistant</h1>
      <p>Canned responses for Service Desk. Search, copy, then paste anywhere.</p>
    </div>
    <button id="themeBtn" type="button" class="ghost-btn">Dark</button>
  </header>

  <main class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-title">Categories</div>
      <nav id="categoryList" class="category-list" aria-label="Categories"></nav>
    </aside>

    <section class="content">
      <section class="toolbar">
        <input id="searchBox" type="search" placeholder="Search title, category, or response..." autofocus />
        <button id="clearBtn" type="button">Clear</button>
      </section>

      <section class="help">
        <strong>Shortcuts:</strong>
        <span><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>F</kbd> search</span>
        <span><kbd>Ctrl</kbd> + <kbd>1-9</kbd> copy visible item</span>
        <span>Click a card or Copy button to copy</span>
      </section>

      <section id="status" aria-live="polite"></section>
      <section id="responseList" class="response-list"></section>
    </section>
  </main>

  <footer>
    Edit canned responses in <code>responses.js</code>. Change shortcuts in <code>app.js</code>.
  </footer>

  <script src="responses.js"></script>
  <script src="app.js"></script>
</body>
</html>
